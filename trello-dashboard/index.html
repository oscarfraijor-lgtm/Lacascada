        function TaskCreatorView({ boards, lists, members, createCard, fetchBoardDetails }) {
            const [inputMode, setInputMode] = useState('text');
            const [rawText, setRawText] = useState('');
            const [parsedTasks, setParsedTasks] = useState([]);
            const [isListening, setIsListening] = useState(false);
            const [expandedTask, setExpandedTask] = useState(null);
            const [boardListsCache, setBoardListsCache] = useState({});
            const [creatingTaskId, setCreatingTaskId] = useState(null);
            const recognitionRef = React.useRef(null);

            const fetchListsForBoard = async (boardId) => {
                if (boardListsCache[boardId]) return boardListsCache[boardId];
                try {
                    const res = await fetch(`${TRELLO_API_BASE}/boards/${boardId}/lists?key=${TRELLO_API_KEY}&token=${TRELLO_TOKEN}`);
                    const data = await res.json();
                    const filtered = data.filter(l => !l.closed);
                    setBoardListsCache(prev => ({ ...prev, [boardId]: filtered }));
                    return filtered;
                } catch (err) { console.error(err); return []; }
            };

            // Voice — start/stop toggle with persistent ref
            const toggleListening = () => {
                if (isListening && recognitionRef.current) {
                    recognitionRef.current.stop();
                    setIsListening(false);
                    return;
                }
                if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                    alert('Tu navegador no soporta reconocimiento de voz. Usa Chrome.'); return;
                }
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                const rec = new SpeechRecognition();
                rec.lang = 'es-MX';
                rec.continuous = true;
                rec.interimResults = false;
                rec.maxAlternatives = 1;
                recognitionRef.current = rec;

                rec.onstart = () => setIsListening(true);
                rec.onresult = (event) => {
                    let transcript = '';
                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        transcript += event.results[i][0].transcript;
                    }
                    if (transcript) {
                        setRawText(prev => {
                            const sep = prev && !prev.endsWith('\n') && !prev.endsWith('. ') ? '\n' : '';
                            return prev + sep + transcript;
                        });
                    }
                };
                rec.onerror = (e) => { console.error('Speech error:', e.error); setIsListening(false); recognitionRef.current = null; };
                rec.onend = () => { setIsListening(false); recognitionRef.current = null; };
                rec.start();
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => setRawText(ev.target.result);
                reader.readAsText(file);
            };

            // Board names for matching
            const boardNames = boards.map(b => b.name.toLowerCase());

            // ====== PARSER V3: Only real actionable tasks ======
            const parseTasks = () => {
                if (!rawText.trim()) { alert('Ingresa contenido primero'); return; }

                const memberNames = members.map(m => ({
                    id: m.id,
                    name: m.fullName?.toLowerCase() || '',
                    username: m.username?.toLowerCase() || '',
                    firstName: (m.fullName?.split(' ')[0] || '').toLowerCase()
                }));

                // Future-tense / imperative action verbs (things TO DO)
                const futureActionPatterns = [
                    /\b(crear|hacer|diseñar|revisar|enviar|subir|publicar|preparar|configurar)\b/i,
                    /\b(contactar|programar|escribir|grabar|editar|optimizar|actualizar)\b/i,
                    /\b(desarrollar|implementar|definir|analizar|investigar|comprar|contratar)\b/i,
                    /\b(organizar|coordinar|agendar|planear|producir|lanzar|montar|armar)\b/i,
                    /\b(entregar|terminar|completar|finalizar|corregir|mejorar|cambiar)\b/i,
                    /\b(establecer|generar|verificar|solicitar|negociar|cotizar|proponer)\b/i,
                    /\b(evaluar|reportar|documentar|capacitar|migrar|agendar|gestionar)\b/i,
                    /\b(create|make|design|review|send|upload|publish|build|fix|update|schedule)\b/i,
                ];

                // Patterns that indicate a task assignment
                const taskIndicators = [
                    /\b(necesita|debe|tiene que|hay que|falta|pendiente)\b/i,
                    /\b(se requiere|se necesita|acción|action item|todo|tarea)\b/i,
                    /\b(siguiente paso|next step|por hacer|to do)\b/i,
                ];

                // Past-tense / descriptive — NOT tasks, just meeting notes
                const pastDescriptive = [
                    /\b(se centró|se discutió|se revisó|se mencionó|se habló|se comentó)\b/i,
                    /\b(se confirmó|se estableció|se acordó|se explicó|se presentó|se analizó)\b/i,
                    /\b(revisión del?|discusión sobre|análisis de|resumen de|aclaración sobre)\b/i,
                    /\b(se trató|se abordó|se evaluó|se comparó|se identificó|se observó)\b/i,
                    /\b(fue|fueron|era|estaba|había|hubo|tuvo)\b/i,
                    /\b(impulsó|impulso la|la baja conversión|se impulsó)\b/i,
                ];

                // Non-task content patterns
                const nonTaskPatterns = [
                    /\b(transcripción|transcript|registros de la reunión|notas de la reunión)\b/i,
                    /\b(aclaración sobre|uso de vpn|acceso a recursos)\b/i,
                    /^\d{1,2}\s*(mar|feb|ene|abr|may|jun|jul|ago|sep|oct|nov|dic)/i,
                    /^\d{2}:\d{2}/,
                    /\(\d{2}:\d{2}:\d{2}\)/,
                    /^reunión del/i,
                ];

                const rawLines = rawText.split(/\n/).map(l => l.trim()).filter(l => l.length > 0);
                const tasks = [];
                let sectionContext = '';
                let accumulatedContext = [];

                const generateShortName = (fullText) => {
                    let clean = fullText
                        .replace(/^[-*•✓✔☐☑→>]\s*/, '')
                        .replace(/^\d+[.)]\s*/, '')
                        .replace(/\*\*/g, '')
                        .replace(/\(\d{2}:\d{2}(:\d{2})?\)/g, '')
                        .trim();
                    // Remove member full names to keep name about the ACTION
                    for (const m of memberNames) {
                        if (m.name) clean = clean.replace(new RegExp(m.name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'), '').trim();
                        if (m.firstName.length > 2) clean = clean.replace(new RegExp('\\b' + m.firstName + '\\b', 'gi'), '').trim();
                    }
                    // Remove dates/priority words
                    clean = clean
                        .replace(/\b(para |antes de |hasta )?(hoy|mañana|esta semana|próxima semana|lunes|martes|miércoles|jueves|viernes)\b/gi, '')
                        .replace(/\b(urgente|importante|asap|inmediato|prioridad)\b/gi, '')
                        .replace(/^(se |se debe |se necesita |hay que |es necesario |que |también |además |necesita |debe )/i, '')
                        .replace(/^[,:;.\-–—]\s*/, '')
                        .replace(/\s{2,}/g, ' ')
                        .trim();
                    if (clean.length > 55) {
                        const cut = clean.substring(0, 55);
                        const sp = cut.lastIndexOf(' ');
                        clean = cut.substring(0, sp > 25 ? sp : 55);
                    }
                    if (clean.length < 3) return '';
                    return clean.charAt(0).toUpperCase() + clean.slice(1);
                };

                for (let i = 0; i < rawLines.length; i++) {
                    const line = rawLines[i];
                    const lineLower = line.toLowerCase();

                    // Skip separators, timestamps, meta
                    if (/^[-=_*]{3,}$/.test(line)) continue;
                    if (nonTaskPatterns.some(p => p.test(line))) { accumulatedContext.push(line); continue; }

                    // Headers / bold titles → section context
                    if (/^#{1,4}\s/.test(line) || /^\*\*[^*]+\*\*$/.test(line.trim())) {
                        sectionContext = line.replace(/^#+\s*/, '').replace(/\*\*/g, '').trim();
                        accumulatedContext = [];
                        continue;
                    }

                    // Too short
                    if (line.replace(/[^a-záéíóúñ]/gi, '').length < 6) { continue; }

                    // Is this line PAST TENSE / descriptive? → NOT a task
                    const isPastDescription = pastDescriptive.some(p => p.test(lineLower));
                    if (isPastDescription) {
                        accumulatedContext.push(line);
                        continue;
                    }

                    // Does this line have a FUTURE action verb?
                    const hasFutureAction = futureActionPatterns.some(p => p.test(lineLower));
                    const hasTaskIndicator = taskIndicators.some(p => p.test(lineLower));
                    const isBullet = /^[-*•✓✔☐☑→>]\s/.test(line) || /^\d+[.)]\s/.test(line);

                    // Only create a task if there's a clear future action or task indicator
                    if (hasFutureAction || hasTaskIndicator) {
                        // Detect members
                        const assignedMembers = [];
                        for (const member of memberNames) {
                            if (member.firstName.length > 2 && lineLower.includes(member.firstName)) {
                                assignedMembers.push(member.id);
                            }
                        }

                        // Try to detect which board/client this relates to
                        let detectedBoardId = '';
                        for (const board of boards) {
                            const bName = board.name.toLowerCase();
                            if (bName.length > 3 && lineLower.includes(bName)) {
                                detectedBoardId = board.id;
                                break;
                            }
                            // Check section context too
                            if (bName.length > 3 && sectionContext.toLowerCase().includes(bName)) {
                                detectedBoardId = board.id;
                            }
                        }

                        // Priority
                        let priority = 'normal';
                        if (/\b(urgente|asap|inmediato|crítico|critico)\b/i.test(lineLower)) priority = 'urgente';
                        else if (/\b(importante|prioridad|clave|esencial)\b/i.test(lineLower)) priority = 'alta';

                        // Due date
                        let dueHint = '', dueDate = null;
                        const today = new Date();
                        if (/\bhoy\b/i.test(lineLower)) { dueHint = 'Hoy'; dueDate = today.toISOString().split('T')[0]; }
                        else if (/\bmañana\b/i.test(lineLower)) { dueHint = 'Mañana'; const d = new Date(today); d.setDate(d.getDate()+1); dueDate = d.toISOString().split('T')[0]; }
                        else if (/\besta semana\b/i.test(lineLower)) { dueHint = 'Esta semana'; const d = new Date(today); d.setDate(d.getDate()+(5-d.getDay())); dueDate = d.toISOString().split('T')[0]; }
                        else if (/\b(próxima|proxima) semana\b/i.test(lineLower)) { dueHint = 'Próxima semana'; const d = new Date(today); d.setDate(d.getDate()+(8-d.getDay())); dueDate = d.toISOString().split('T')[0]; }

                        // Description
                        const descParts = [];
                        if (sectionContext) descParts.push(sectionContext);
                        if (accumulatedContext.length > 0) descParts.push(accumulatedContext.join('\n'));
                        descParts.push(line);

                        // Look ahead for continuation lines
                        let j = i + 1;
                        while (j < rawLines.length) {
                            const nl = rawLines[j];
                            const nlLower = nl.toLowerCase();
                            if (futureActionPatterns.some(p => p.test(nlLower)) && !nl.startsWith('  ')) break;
                            if (/^#{1,4}\s/.test(nl) || /^\*\*/.test(nl)) break;
                            if (nl.startsWith('  ') || nl.startsWith('\t') || nl.length < 60) {
                                descParts.push(nl);
                                j++;
                            } else break;
                        }

                        const shortName = generateShortName(line);
                        if (shortName.length < 4) continue;

                        tasks.push({
                            id: Math.random().toString(36).substr(2, 9),
                            name: shortName,
                            description: descParts.join('\n'),
                            assignedMembers,
                            priority, dueHint, dueDate,
                            boardId: detectedBoardId,
                            listId: '',
                            status: 'pending',
                        });
                        accumulatedContext = [];
                    } else {
                        accumulatedContext.push(line);
                    }
                }

                setParsedTasks(tasks);
                if (tasks.length > 0) setExpandedTask(tasks[0].id);
                else alert('No se encontraron tareas accionables. Asegúrate de que el texto contiene acciones claras como: crear, diseñar, revisar, enviar, etc.');
            };

            const updateTask = (taskId, field, value) => {
                setParsedTasks(prev => prev.map(t => t.id === taskId ? { ...t, [field]: value } : t));
            };
            const toggleTaskMember = (taskId, memberId) => {
                setParsedTasks(prev => prev.map(t => {
                    if (t.id !== taskId) return t;
                    const nm = t.assignedMembers.includes(memberId)
                        ? t.assignedMembers.filter(id => id !== memberId)
                        : [...t.assignedMembers, memberId];
                    return { ...t, assignedMembers: nm };
                }));
            };
            const removeTask = (taskId) => {
                setParsedTasks(prev => prev.filter(t => t.id !== taskId));
                if (expandedTask === taskId) setExpandedTask(null);
            };
            const createSingleTask = async (task) => {
                if (!task.boardId) { alert('Selecciona un board para esta tarea'); return; }
                let listId = task.listId;
                if (!listId) {
                    const bLists = await fetchListsForBoard(task.boardId);
                    if (bLists.length === 0) { alert('Este board no tiene listas'); return; }
                    // Prefer "Tareas" list, fallback to first list
                    const tareasList = bLists.find(l => l.name.toLowerCase().includes('tarea'));
                    listId = tareasList ? tareasList.id : bLists[0].id;
                }
                setCreatingTaskId(task.id);
                try {
                    const params = new URLSearchParams({
                        key: TRELLO_API_KEY, token: TRELLO_TOKEN,
                        idList: listId, name: task.name, desc: task.description || '', pos: 'bottom'
                    });
                    if (task.dueDate) params.append('due', task.dueDate);
                    const response = await fetch(`${TRELLO_API_BASE}/cards?${params.toString()}`, { method: 'POST' });
                    if (!response.ok) {
                        const errBody = await response.text();
                        console.error('Trello API error:', response.status, errBody);
                        throw new Error(`Error ${response.status}: ${errBody}`);
                    }
                    const newCard = await response.json();
                    console.log('Card created:', newCard.id, newCard.shortUrl);
                    for (const mid of task.assignedMembers) {
                        await fetch(`${TRELLO_API_BASE}/cards/${newCard.id}/idMembers?key=${TRELLO_API_KEY}&token=${TRELLO_TOKEN}&value=${mid}`, { method: 'POST' });
                    }
                    const boardName = boards.find(b => b.id === task.boardId)?.name || '';
                    const bLists = boardListsCache[task.boardId] || [];
                    const listName = bLists.find(l => l.id === listId)?.name || '';
                    updateTask(task.id, 'status', 'created');
                    updateTask(task.id, 'trelloUrl', newCard.shortUrl);
                    setCreatingTaskId(null);
                    alert(`Tarjeta creada en Trello!\n\nBoard: ${boardName}\nLista: ${listName}\nURL: ${newCard.shortUrl}`);
                    const remaining = parsedTasks.filter(t => t.status === 'pending' && t.id !== task.id);
                    if (remaining.length > 0) setExpandedTask(remaining[0].id);
                    else setExpandedTask(null);
                } catch (err) { setCreatingTaskId(null); alert('Error creando tarjeta: ' + err.message); }
            };

            const pendingCount = parsedTasks.filter(t => t.status === 'pending').length;
            const createdCount = parsedTasks.filter(t => t.status === 'created').length;

            return (
                <div className="space-y-5">
                    {/* Header */}
                    <div className="glass-strong rounded-3xl shadow-lg p-8">
                        <h2 className="text-3xl font-anton text-gray-900 mb-1 tracking-tight">Task Creator</h2>
                        <p className="text-gray-500 font-medium text-sm">Importa notas de reunión, configura cada tarea y envíala a Trello</p>
                    </div>

                    {/* Input Section */}
                    <div className="glass-strong rounded-3xl shadow-lg p-6">
                        <p className="text-[10px] font-bold text-gray-400 tracking-widest mb-4">PASO 1 — ORIGEN</p>
                        <div className="flex gap-2 mb-5">
                            {[['text','Texto'],['voice','Voz'],['file','Archivo']].map(([mode, label]) => (
                                <button key={mode} onClick={() => setInputMode(mode)}
                                    className={`px-5 py-2.5 rounded-full text-sm font-semibold transition-all ${
                                        inputMode === mode
                                            ? 'glass-selected text-white shadow-lg'
                                            : 'glass-pill text-gray-600 hover:bg-white/70'
                                    }`}
                                >{label}</button>
                            ))}
                        </div>

                        {inputMode === 'text' && (
                            <textarea value={rawText} onChange={(e) => setRawText(e.target.value)}
                                placeholder="Pega aquí tus notas de Gemini, actas de reunión, o escribe las tareas directamente..."
                                rows="10" 
                                className="w-full px-4 py-3 bg-white/50 border border-white/40 rounded-2xl focus:ring-2 focus:ring-gray-900/30 focus:border-transparent font-montserrat text-sm resize-y backdrop-blur-sm" />
                        )}

                        {inputMode === 'voice' && (
                            <div className="text-center py-10">
                                <button onClick={toggleListening}
                                    className={`w-28 h-28 rounded-full mx-auto flex items-center justify-center transition-all ${
                                        isListening
                                            ? 'bg-indie-red text-white scale-110 listening-ring shadow-2xl'
                                            : 'glass-dark text-white hover:scale-105 shadow-lg'
                                    }`}
                                >
                                    {isListening
                                        ? <svg xmlns="http://www.w3.org/2000/svg" className="w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /><path strokeLinecap="round" strokeLinejoin="round" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z" /></svg>
                                        : <svg xmlns="http://www.w3.org/2000/svg" className="w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m-4 0h8M12 3a3 3 0 00-3 3v4a3 3 0 006 0V6a3 3 0 00-3-3z" /></svg>
                                    }
                                </button>
                                <p className="mt-5 font-semibold text-gray-700 text-sm">
                                    {isListening ? 'Escuchando — toca para detener' : 'Toca para dictar'}
                                </p>
                                {isListening && (
                                    <p className="text-xs text-indie-red mt-1 font-medium animate-pulse-slow">Grabando audio...</p>
                                )}
                                <p className="text-xs text-gray-400 mt-1">Habla claro, una tarea a la vez</p>
                                {rawText && (
                                    <textarea value={rawText} onChange={(e) => setRawText(e.target.value)} rows="5"
                                        className="mt-6 w-full px-4 py-3 bg-white/50 border border-white/40 rounded-2xl focus:ring-2 focus:ring-gray-900/30 focus:border-transparent text-sm backdrop-blur-sm" />
                                )}
                            </div>
                        )}

                        {inputMode === 'file' && (
                            <div className="text-center py-10">
                                <div className="glass rounded-3xl p-10 hover:bg-white/70 transition-colors cursor-pointer">
                                    <input type="file" accept=".txt,.md,.csv" onChange={handleFileUpload} className="hidden" id="fileUpload" />
                                    <label htmlFor="fileUpload" className="cursor-pointer">
                                        <svg xmlns="http://www.w3.org/2000/svg" className="w-12 h-12 mx-auto text-gray-400 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.5"><path strokeLinecap="round" strokeLinejoin="round" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" /></svg>
                                        <p className="font-semibold text-gray-700 text-sm">Arrastra o selecciona un archivo</p>
                                        <p className="text-xs text-gray-400 mt-1">.txt, .md, .csv</p>
                                    </label>
                                </div>
                                {rawText && (
                                    <textarea value={rawText} onChange={(e) => setRawText(e.target.value)} rows="5"
                                        className="mt-6 w-full px-4 py-3 bg-white/50 border border-white/40 rounded-2xl focus:ring-2 focus:ring-gray-900/30 focus:border-transparent text-sm backdrop-blur-sm" />
                                )}
                            </div>
                        )}

                        {rawText && (
                            <button onClick={parseTasks}
                                className="mt-4 w-full py-3.5 glass-dark text-white rounded-2xl font-bold text-sm hover:opacity-90 transition-all shadow-lg">
                                Analizar y extraer tareas
                            </button>
                        )}
                    </div>

                    {/* Parsed Tasks */}
                    {parsedTasks.length > 0 && (
                        <div className="space-y-3">
                            <div className="glass-strong rounded-3xl shadow-lg p-6">
                                <div className="flex items-center justify-between">
                                    <div>
                                        <p className="text-[10px] font-bold text-gray-400 tracking-widest mb-1">PASO 2 — CONFIGURAR</p>
                                        <p className="text-sm text-gray-500">Selecciona board, lista y miembros por tarea</p>
                                    </div>
                                    <div className="flex gap-3 text-xs font-bold">
                                        <span className="text-gray-400">{parsedTasks.length} total</span>
                                        {createdCount > 0 && <span className="text-green-600">{createdCount} creadas</span>}
                                        {pendingCount > 0 && <span className="text-indie-red">{pendingCount} pendientes</span>}
                                    </div>
                                </div>
                            </div>
                            {parsedTasks.map((task) => (
                                <TaskCard key={task.id} task={task} boards={boards} members={members}
                                    isExpanded={expandedTask === task.id} isCreating={creatingTaskId === task.id}
                                    onToggleExpand={() => setExpandedTask(expandedTask === task.id ? null : task.id)}
                                    onUpdate={(field, value) => updateTask(task.id, field, value)}
                                    onToggleMember={(memberId) => toggleTaskMember(task.id, memberId)}
                                    onRemove={() => removeTask(task.id)} onCreate={() => createSingleTask(task)}
                                    fetchListsForBoard={fetchListsForBoard} boardListsCache={boardListsCache} />
                            ))}
                        </div>
                    )}

                    {/* Guide */}
                    {parsedTasks.length === 0 && (
                        <div className="glass-strong rounded-3xl shadow-lg p-6">
                            <p className="text-[10px] font-bold text-gray-400 tracking-widest mb-4">GUÍA</p>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
                                <div className="glass rounded-2xl p-4">
                                    <h4 className="font-bold text-gray-900 text-sm mb-2">Formato ideal</h4>
                                    <ul className="text-xs text-gray-500 space-y-1.5 leading-relaxed">
                                        <li>Una tarea por línea</li>
                                        <li>Usa verbos: crear, diseñar, revisar</li>
                                        <li>Menciona nombres del equipo</li>
                                        <li>Fechas: hoy, mañana, esta semana</li>
                                    </ul>
                                </div>
                                <div className="glass rounded-2xl p-4">
                                    <h4 className="font-bold text-gray-900 text-sm mb-2">Detección inteligente</h4>
                                    <ul className="text-xs text-gray-500 space-y-1.5 leading-relaxed">
                                        <li>Filtra resúmenes y notas pasadas</li>
                                        <li>Solo extrae acciones futuras reales</li>
                                        <li>Detecta board/cliente por nombre</li>
                                        <li>Ignora discusiones y aclaraciones</li>
                                    </ul>
                                </div>
                                <div className="glass rounded-2xl p-4">
                                    <h4 className="font-bold text-gray-900 text-sm mb-2">Flujo de trabajo</h4>
                                    <ul className="text-xs text-gray-500 space-y-1.5 leading-relaxed">
                                        <li>1. Pega o dicta tus notas</li>
                                        <li>2. Analiza para extraer tareas</li>
                                        <li>3. Configura cada una por separado</li>
                                        <li>4. Crea en Trello una por una</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function TaskCard({ task, boards, members, isExpanded, isCreating, onToggleExpand, onUpdate, onToggleMember, onRemove, onCreate, fetchListsForBoard, boardListsCache }) {
            const [localLists, setLocalLists] = useState([]);
            useEffect(() => {
                if (task.boardId) {
                    if (boardListsCache[task.boardId]) setLocalLists(boardListsCache[task.boardId]);
                    else fetchListsForBoard(task.boardId).then(setLocalLists);
                }
            }, [task.boardId]);

            if (task.status === 'created') {
                return (
                    <div className="glass rounded-3xl p-5 animate-fade-in" style={{borderColor: 'rgba(34,197,94,0.3)'}}>
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 rounded-full bg-green-500 flex items-center justify-center flex-shrink-0">
                                <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="3"><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" /></svg>
                            </div>
                            <div className="flex-1">
                                <h4 className="font-bold text-gray-900 text-sm">{task.name}</h4>
                                <p className="text-xs text-green-600 font-medium">Creada en Trello</p>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className={`glass-strong rounded-3xl overflow-hidden transition-all ${
                    isExpanded ? 'shadow-2xl ring-1 ring-gray-900/10' : 'shadow-lg hover:shadow-xl'
                }`}>
                    <div onClick={onToggleExpand} className="p-5 cursor-pointer flex items-center gap-4">
                        <div className={`w-2 h-10 rounded-full flex-shrink-0 ${
                            task.priority === 'urgente' ? 'bg-red-500' :
                            task.priority === 'alta' ? 'bg-orange-400' : 'bg-gray-300'
                        }`} />
                        <div className="flex-1 min-w-0">
                            <h4 className="font-bold text-gray-900 text-sm">{task.name}</h4>
                            <div className="flex flex-wrap gap-1.5 mt-1.5">
                                {task.boardId && (
                                    <span className="text-[10px] glass-pill text-gray-600 px-2 py-0.5 rounded-md font-semibold">
                                        {boards.find(b => b.id === task.boardId)?.name}
                                    </span>
                                )}
                                {task.assignedMembers.length > 0 && (
                                    <span className="text-[10px] glass-pill text-gray-600 px-2 py-0.5 rounded-md font-semibold">
                                        {task.assignedMembers.length} miembro{task.assignedMembers.length > 1 ? 's' : ''}
                                    </span>
                                )}
                                {task.dueDate && (
                                    <span className="text-[10px] glass-pill text-gray-600 px-2 py-0.5 rounded-md font-semibold">
                                        {task.dueHint || task.dueDate}
                                    </span>
                                )}
                            </div>
                        </div>
                        <svg xmlns="http://www.w3.org/2000/svg" className={`w-5 h-5 text-gray-400 transition-transform ${isExpanded ? 'rotate-180' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M19 9l-7 7-7-7" /></svg>
                    </div>

                    {isExpanded && (
                        <div className="px-5 pb-6 border-t border-white/30 pt-5 space-y-5 animate-fade-in">
                            <div>
                                <label className="block text-[10px] font-bold text-gray-400 tracking-widest mb-1.5">NOMBRE</label>
                                <input type="text" value={task.name} onChange={(e) => onUpdate('name', e.target.value)}
                                    className="w-full px-4 py-2.5 bg-white/50 border border-white/40 rounded-2xl focus:ring-2 focus:ring-gray-900/30 focus:border-transparent text-sm font-semibold backdrop-blur-sm" />
                            </div>
                            <div>
                                <label className="block text-[10px] font-bold text-gray-400 tracking-widest mb-1.5">DESCRIPCIÓN</label>
                                <textarea value={task.description} onChange={(e) => onUpdate('description', e.target.value)}
                                    placeholder="Detalles, instrucciones, contexto..." rows="4"
                                    className="w-full px-4 py-2.5 bg-white/50 border border-white/40 rounded-2xl focus:ring-2 focus:ring-gray-900/30 focus:border-transparent text-sm backdrop-blur-sm" />
                            </div>
                            <div>
                                <label className="block text-[10px] font-bold text-gray-400 tracking-widest mb-2">BOARD</label>
                                <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
                                    {boards.map(board => (
                                        <div key={board.id}
                                            onClick={() => { onUpdate('boardId', board.id); onUpdate('listId', ''); }}
                                            className={`rounded-2xl p-3 cursor-pointer transition-all text-xs font-semibold text-center ${
                                                task.boardId === board.id
                                                    ? 'glass-selected text-white shadow-lg'
                                                    : 'glass text-gray-700 hover:bg-white/80'
                                            }`}>{board.name}</div>
                                    ))}
                                </div>
                            </div>
                            {task.boardId && localLists.length > 0 && (
                                <div>
                                    <label className="block text-[10px] font-bold text-gray-400 tracking-widest mb-2">LISTA</label>
                                    <div className="flex flex-wrap gap-2">
                                        {localLists.map(list => (
                                            <div key={list.id} onClick={() => onUpdate('listId', list.id)}
                                                className={`rounded-xl px-4 py-2 cursor-pointer transition-all text-xs font-semibold ${
                                                    task.listId === list.id
                                                        ? 'bg-indie-blue text-white shadow-lg'
                                                        : 'glass text-gray-700 hover:bg-white/80'
                                                }`}>{list.name}</div>
                                        ))}
                                    </div>
                                </div>
                            )}
                            <div>
                                <label className="block text-[10px] font-bold text-gray-400 tracking-widest mb-2">MIEMBROS</label>
                                <div className="flex flex-wrap gap-2">
                                    {members.map(member => (
                                        <div key={member.id} onClick={() => onToggleMember(member.id)}
                                            className={`px-3.5 py-2 rounded-full cursor-pointer transition-all text-xs font-semibold ${
                                                task.assignedMembers.includes(member.id)
                                                    ? 'glass-selected text-white shadow-lg'
                                                    : 'glass text-gray-600 hover:bg-white/80'
                                            }`}>{member.fullName || member.username}</div>
                                    ))}
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-[10px] font-bold text-gray-400 tracking-widest mb-2">PRIORIDAD</label>
                                    <div className="flex gap-2">
                                        {[['normal','Normal'],['alta','Alta'],['urgente','Urgente']].map(([p, label]) => (
                                            <div key={p} onClick={() => onUpdate('priority', p)}
                                                className={`flex-1 text-center px-3 py-2 rounded-xl cursor-pointer transition-all text-xs font-bold ${
                                                    task.priority === p
                                                        ? p === 'urgente' ? 'bg-red-500 text-white shadow-lg' :
                                                          p === 'alta' ? 'bg-orange-400 text-white shadow-lg' :
                                                          'glass-selected text-white shadow-lg'
                                                        : 'glass text-gray-600 hover:bg-white/80'
                                                }`}>{label}</div>
                                        ))}
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-[10px] font-bold text-gray-400 tracking-widest mb-2">FECHA LÍMITE</label>
                                    <input type="date" value={task.dueDate || ''} onChange={(e) => onUpdate('dueDate', e.target.value)}
                                        className="w-full px-3 py-2 bg-white/50 border border-white/40 rounded-xl focus:ring-2 focus:ring-gray-900/30 focus:border-transparent text-xs backdrop-blur-sm" />
                                </div>
                            </div>
                            <div className="flex gap-3 pt-4 border-t border-white/30">
                                <button onClick={onRemove}
                                    className="px-5 py-2.5 text-gray-500 text-xs font-semibold hover:text-red-500 transition-colors">
                                    Eliminar
                                </button>
                                <button onClick={onCreate} disabled={isCreating || !task.boardId}
                                    className="flex-1 py-3 glass-dark text-white rounded-2xl font-bold text-sm hover:opacity-90 transition-all shadow-lg disabled:opacity-40">
                                    {isCreating ? 'Creando...' : 'Crear en Trello'}
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<TrelloDashboard />, document.getElementById('root'));
    </script>
</body>
</html>
