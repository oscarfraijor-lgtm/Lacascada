                const q = search.toLowerCase();
                return categories.map(cat => ({
                    ...cat,
                    sops: cat.sops.filter(sop => 
                        sop.title.toLowerCase().includes(q) || 
                        cat.title.toLowerCase().includes(q) ||
                        cat.description.toLowerCase().includes(q)

                })).filter(cat => cat.sops.length > 0);

                                            <a 
                                                key={sop.id}
                                                href={sop.link}
                                                className="group bg-white rounded-xl border border-gray-100 p-4 hover:border-gray-300 hover:shadow-md transition-all duration-200"
                                            >
                                                <div className="flex items-start justify-between mb-2">
                                                    <div className="w-7 h-7 rounded-lg flex items-center justify-center text-white text-[10px] font-black flex-shrink-0 group-hover:scale-110 transition-transform"
                                                         style={{ background: category.color }}>
                                                        {sopIdx + 1}
                                                    </div>
                                                    <div className="flex items-center gap-2">
                                                        <span className={`text-[9px] font-bold px-2 py-0.5 rounded-full ${difficultyColors[sop.difficulty].bg} ${difficultyColors[sop.difficulty].text}`}>
                                                            {sop.difficulty}
                                                        </span>
                                                    </div>
                                                </div>
                                                <h3 className="text-sm font-bold text-gray-900 mb-1 group-hover:text-gray-700 leading-snug">
                                                    {sop.title}
                                                </h3>
                                                <div className="flex items-center gap-3 mt-2">
                                                    <span className="text-[10px] font-bold text-gray-400 flex items-center gap-1">
                                                        <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                                        {sop.time}
                                                    </span>
                                                    <span className="text-[10px] font-bold flex items-center gap-1 group-hover:translate-x-1 transition-transform" style={{ color: category.color }}>
                                                        Ver SOP
                                                        <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7"/></svg>
                                                    </span>
                                                </div>
                                            </a>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>

                        {filteredCategories.length === 0 && search && (
                            <div className="text-center py-16">
                                <div className="text-4xl mb-4">🔍</div>
                                <h3 className="text-lg font-bold text-gray-900 mb-2">No se encontraron resultados</h3>
                                <p className="text-sm text-gray-500">Intenta con otro término de búsqueda</p>
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="border-t border-gray-200 bg-white mt-12">
                        <div className="max-w-6xl mx-auto px-6 py-8">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <div className="w-8 h-8 rounded-lg flex items-center justify-center" style={{ background: BRAND.primary }}>
                                        <span className="text-white font-black text-[10px]">IPM</span>
                                    </div>
                                    <div>
                                        <div className="text-sm font-bold text-gray-900">TikTok Shop Genius</div>
                                        <div className="text-[10px] text-gray-500 font-medium">Indie Pro Marketing &middot; Internal Use Only</div>
                                    </div>
                                </div>
                                <div className="flex items-center gap-2">
                                    <div className="w-2 h-2 rounded-full pulse-dot" style={{ background: BRAND.primary }}></div>
                                    <div className="w-2 h-2 rounded-full pulse-dot" style={{ background: BRAND.yellow, animationDelay: '0.3s' }}></div>
                                    <div className="w-2 h-2 rounded-full pulse-dot" style={{ background: BRAND.blue, animationDelay: '0.6s' }}></div>
                                </div>
                                <div className="text-xs text-gray-400 font-medium">&copy; 2026 Indie Pro Marketing</div>
                            </div>
                            <div className="mt-4 pt-4 border-t border-gray-100 flex items-center gap-4 text-[10px] text-gray-400 font-bold uppercase tracking-widest">
                                <a href="../tiktok-shop-onboarding/index.html" className="hover:text-gray-900 transition">Documentos de Onboarding</a>
                                <span>&middot;</span>
                                <a href="../tiktok-shop-dashboard/index.html" className="hover:text-gray-900 transition">Dashboard</a>
                                <span>&middot;</span>
                                <span>Recursos de TikTok:</span>
                                <a href="https://seller-us.tiktok.com/university/home" target="_blank" className="hover:text-gray-900 transition">Seller University</a>
                                <a href="https://www.tiktokacademy.com/student/catalog" target="_blank" className="hover:text-gray-900 transition">TikTok Academy</a>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
